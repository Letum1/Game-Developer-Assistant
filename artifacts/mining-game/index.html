    <style>
      /* Base dark background — applied before any JS runs to prevent white flash */
      html, body, #root {
        background-color: hsl(220, 20%, 6%);
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      /* Splash screen shown instantly from HTML — hides once React mounts */
      #splash {
        position: fixed;
        inset: 0;
        background-color: hsl(220, 20%, 6%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 9999;
        /* Fade out smoothly when React removes it */
        transition: opacity 0.3s ease;
      }

      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      /* Pickaxe icon using pure CSS — no image dependency */
      .splash-icon {
        font-size: 48px;
        animation: pulse 1.2s ease-in-out infinite;
      }

      .splash-title {
        font-family: Inter, system-ui, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: hsl(45, 90%, 55%);
        text-transform: uppercase;
      }

      /* Three-dot spinner beneath the title */
      .splash-dots {
        display: flex;
        gap: 8px;
      }

      .splash-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: hsl(45, 90%, 55%);
        animation: bounce 1.2s ease-in-out infinite;
      }

      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.15); }
      }

      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0);   opacity: 0.4; }
        40%            { transform: translateY(-8px); opacity: 1;   }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen rendered from raw HTML — visible instantly before JS loads -->
    <div id="splash">
      <div class="splash-icon">⛏️</div>
      <div class="splash-title">MineVault</div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Remove the splash once React has rendered its first frame -->
    <script>
      (function () {
        /* Watch for the first child added to #root (React mounting) */
        var splash = document.getElementById('splash');
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.firstChild) {
            observer.disconnect();
            /* Trigger fade-out, then remove from DOM entirely */
            splash.classList.add('hide');
            setTimeout(function () {
              splash.parentNode && splash.parentNode.removeChild(splash);
            }, 350);
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
