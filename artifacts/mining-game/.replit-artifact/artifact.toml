kind = "web"
previewPath = "/"
title = "MineVault - Multiplayer Mining Game"
version = "1.0.0"
id = "artifacts/mining-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23242

[services.development]
# Run the full production API server (static files + /api/* routes)
# on this artifact's assigned port so the preview picker entry works correctly
run = "NODE_ENV=production pnpm --filter @workspace/api-server run start"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mining-game", "run", "build" ]
publicDir = "artifacts/mining-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23242"
BASE_PATH = "/"
