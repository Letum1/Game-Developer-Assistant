kind = "web"
previewPath = "/"
title = "MineVault - Multiplayer Mining Game"
version = "1.0.0"
id = "artifacts/mining-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23242

[services.development]
run = "pnpm --filter @workspace/mining-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mining-game", "run", "build" ]
publicDir = "artifacts/mining-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23242"
BASE_PATH = "/"
