kind = "web"
previewPath = "/old-game/"
title = "MineVault - 2D Mining Game (Legacy)"
version = "1.0.0"
id = "artifacts/game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/old-game/" ]
localPort = 24631

[services.development]
# Point to the main production server so this entry never shows a blank screen
run = "NODE_ENV=production pnpm --filter @workspace/api-server run start"

[services.production]
build = [ "pnpm", "--filter", "@workspace/game", "run", "build" ]
publicDir = "artifacts/game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24631"
BASE_PATH = "/old-game/"
